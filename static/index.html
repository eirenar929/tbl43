<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Столик на троих — Мультиагентный чат</title>
  
  <!-- Markdown рендер -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Подсветка кода -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #e0e0e0;
    }
    
    #app {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    header {
      text-align: center;
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    header h1 {
      margin: 0;
      font-size: 1.8rem;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    header p {
      margin: 5px 0 0;
      color: #888;
      font-size: 0.9rem;
    }
    
    #chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      margin: 20px 0;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      scroll-behavior: smooth;
    }
    
    .message {
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      text-align: right;
    }
    
    .message.bot {
      text-align: left;
    }
    
    .message-bubble {
      display: inline-block;
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      word-wrap: break-word;
    }
    
    .message.user .message-bubble {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }
    
    .message.bot .message-bubble {
      background: rgba(255,255,255,0.1);
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }
    
    .message-meta {
      font-size: 0.75rem;
      color: #666;
      margin-top: 4px;
    }
    
    .message.user .message-meta {
      text-align: right;
    }
    
    /* Markdown стили */
    .message-bubble h1, .message-bubble h2, .message-bubble h3 {
      margin-top: 0;
      margin-bottom: 10px;
    }
    
    .message-bubble pre {
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 10px 0;
    }
    
    .message-bubble code {
      font-family: 'Fira Code', monospace;
      font-size: 0.9em;
    }
    
    .message-bubble p {
      margin: 0 0 10px;
    }
    
    .message-bubble p:last-child {
      margin-bottom: 0;
    }
    
    .message-bubble ul, .message-bubble ol {
      margin: 10px 0;
      padding-left: 20px;
    }
    
    .message-bubble blockquote {
      border-left: 3px solid #667eea;
      margin: 10px 0;
      padding-left: 15px;
      color: #aaa;
    }
    
    .message-bubble hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.2);
      margin: 15px 0;
    }
    
    #input-area {
      padding: 15px 20px;
      background: rgba(0,0,0,0.2);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 10px;
    }
    
    #messageInput {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 24px;
      background: rgba(255,255,255,0.1);
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      resize: none;
      min-height: 48px;
      max-height: 120px;
    }
    
    #messageInput::placeholder {
      color: #666;
    }
    
    #sendBtn {
      padding: 12px 24px;
      border: none;
      border-radius: 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    #sendBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    
    #sendBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .typing-indicator {
      display: none;
      padding: 10px 20px;
      color: #888;
      font-size: 0.9rem;
    }
    
    .typing-indicator.active {
      display: block;
    }
    
    .dots {
      display: inline-block;
    }
    
    .dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
    
    .error-message {
      background: rgba(255, 71, 87, 0.2) !important;
      border: 1px solid rgba(255, 71, 87, 0.5);
    }
    
    #connection-status {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    
    #connection-status.connected {
      background: rgba(46, 213, 115, 0.2);
      color: #2ed573;
    }
    
    #connection-status.disconnected {
      background: rgba(255, 71, 87, 0.2);
      color: #ff4757;
    }
    
    /* Скроллбар */
    #messages::-webkit-scrollbar {
      width: 8px;
    }
    
    #messages::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.1);
      border-radius: 4px;
    }
    
    #messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
    }
    
    #messages::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div id="connection-status" class="disconnected">● Offline</div>
  
  <div id="app">
    <header>
      <h1>💬 Столик на троих</h1>
      <p>Мультиагентный чат с несколькими ИИ-моделями</p>
    </header>
    
    <div id="chat-container">
      <div id="messages"></div>
      
      <div class="typing-indicator" id="typingIndicator">
        <span class="dots">Модели думают</span>
      </div>
      
      <div id="input-area">
        <textarea 
          id="messageInput" 
          placeholder="Введите сообщение..." 
          rows="1"
        ></textarea>
        <button id="sendBtn" onclick="sendMessage()">Отправить</button>
      </div>
    </div>
  </div>

  <script>
    // WebSocket соединение
    const ws = new WebSocket(`ws://${window.location.host}/ws`);
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');
    const connectionStatus = document.getElementById('connection-status');
    
    let isWaiting = false;
    
    // Настройка marked
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true
    });
    
    // WebSocket обработчики
    ws.onopen = () => {
      console.log('WebSocket connected');
      connectionStatus.textContent = '● Online';
      connectionStatus.className = 'connected';
    };
    
    ws.onclose = () => {
      console.log('WebSocket disconnected');
      connectionStatus.textContent = '● Offline';
      connectionStatus.className = 'disconnected';
      addSystemMessage('Соединение потеряно. Перезагрузите страницу.');
    };
    
    ws.onerror = (error) => {
      console.error('WebSocket error:', error);
      addSystemMessage('Ошибка соединения');
    };
    
    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      console.log('Received:', data);
      
      typingIndicator.classList.remove('active');
      isWaiting = false;
      sendBtn.disabled = false;
      
      if (data.type === 'response') {
        addBotMessage(data.content);
      } else if (data.type === 'error') {
        addErrorMessage(data.message);
      }
    };
    
    // Функции добавления сообщений
    function addUserMessage(text) {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message user';
      messageDiv.innerHTML = `
        <div class="message-bubble">${escapeHtml(text)}</div>
        <div class="message-meta">Вы • ${formatTime()}</div>
      `;
      messagesDiv.appendChild(messageDiv);
      scrollToBottom();
    }
    
    function addBotMessage(text) {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message bot';
      // Санитизация HTML для предотвращения XSS атак
      const sanitizedText = sanitizeHtml(marked.parse(text));
      messageDiv.innerHTML = `
        <div class="message-bubble">${sanitizedText}</div>
        <div class="message-meta">AI • ${formatTime()}</div>
      `;
      messagesDiv.appendChild(messageDiv);
      
      // Подсветка кода в новом сообщении
      messageDiv.querySelectorAll('pre code').forEach((block) => {
        hljs.highlightElement(block);
      });
      
      scrollToBottom();
    }
    
    function addErrorMessage(text) {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message bot';
      messageDiv.innerHTML = `
        <div class="message-bubble error-message">⚠️ ${escapeHtml(text)}</div>
        <div class="message-meta">Система • ${formatTime()}</div>
      `;
      messagesDiv.appendChild(messageDiv);
      scrollToBottom();
    }
    
    function addSystemMessage(text) {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message bot';
      messageDiv.innerHTML = `
        <div class="message-bubble" style="background: rgba(255,255,255,0.05); font-style: italic;">
          ${escapeHtml(text)}
        </div>
      `;
      messagesDiv.appendChild(messageDiv);
      scrollToBottom();
    }
    
    // Отправка сообщения
    function sendMessage() {
      const message = messageInput.value.trim();
      if (!message || isWaiting) return;
      
      if (ws.readyState !== WebSocket.OPEN) {
        addErrorMessage('Нет соединения с сервером');
        return;
      }
      
      addUserMessage(message);
      ws.send(message);
      
      messageInput.value = '';
      messageInput.style.height = 'auto';
      
      isWaiting = true;
      sendBtn.disabled = true;
      typingIndicator.classList.add('active');
    }
    
    // Авто-ресайз textarea
    messageInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    
    // Отправка по Enter (Shift+Enter для новой строки)
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    // Вспомогательные функции
    function scrollToBottom() {
      setTimeout(() => {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }, 100);
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Санитизация HTML для предотвращения XSS атак
    function sanitizeHtml(html) {
      const allowedTags = ['p', 'br', 'strong', 'em', 'b', 'i', 'u', 'code', 'pre', 
                          'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6',
                          'blockquote', 'hr', 'a', 'span', 'div'];
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      
      // Рекурсивная очистка элементов
      function cleanElement(element) {
        // Удаляем все атрибуты кроме безопасных
        const safeAttrs = ['href', 'src', 'alt', 'title', 'class', 'id'];
        for (const attr of Array.from(element.attributes)) {
          if (!safeAttrs.includes(attr.name)) {
            element.removeAttribute(attr.name);
          }
          // Проверяем href и src на javascript: протокол
          if (attr.name === 'href' || attr.name === 'src') {
            const value = attr.value.toLowerCase().trim();
            if (value.startsWith('javascript:') || value.startsWith('data:')) {
              element.removeAttribute(attr.name);
            }
          }
        }
        
        // Рекурсивно обрабатываем детей
        for (const child of Array.from(element.children)) {
          if (!allowedTags.includes(child.tagName.toLowerCase())) {
            // Заменяем запрещённый тег на его текстовое содержимое
            const textNode = document.createTextNode(child.textContent);
            child.parentNode.replaceChild(textNode, child);
          } else {
            cleanElement(child);
          }
        }
      }
      
      cleanElement(doc.body);
      return doc.body.innerHTML;
    }
    
    function formatTime() {
      const now = new Date();
      return now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }
    
    // Фокус на input при загрузке
    messageInput.focus();
  </script>
</body>
</html>
